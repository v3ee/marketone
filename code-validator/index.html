<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marketone Code Validator</title>
  <link rel="icon" type="image/png" href="../favicon.png" />

  <!-- Google Fonts -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bitter:wght@300;400;500;600;700&display=swap" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css" />

  <!-- HTMLHint -->
  <script src="https://cdn.jsdelivr.net/npm/htmlhint@1.1.4/dist/htmlhint.min.js"></script>

  <!-- ESLint -->
  <script src="https://cdn.jsdelivr.net/npm/eslint4b-prebuilt/dist/eslint4b.min.js"></script>

  <!-- Prettier -->
  <script src="https://unpkg.com/prettier@3.3.3/standalone.js"></script>
  <script src="https://unpkg.com/prettier@3.3.3/plugins/html.js"></script>
  <script src="https://unpkg.com/prettier@3.3.3/plugins/postcss.js"></script>
  <script src="https://unpkg.com/prettier@3.3.3/plugins/babel.js"></script>

  <!-- Monaco Editor -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
</head>

<body>
  <!-- TOPBAR / HEADER -->
  <div class="topbar">
    <div class="logo">
      <a href="../" class="logo-link">
        <img src="../logo.png" alt="MarketOne" class="main-logo" />
      </a>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="container">
    <div class="left">
      <div class="toolbar">
        <button onclick="validateCode()">Validate</button>
        <button id="formatBtn" onclick="formatCode()">Format</button>
        <button id="minifyBtn" onclick="minifyCode()" class="hidden">Minify</button>
        <button id="unminifyBtn" onclick="unminifyCode()" class="hidden"> Unminify</button>
        <button id="fixBtn" onclick="applyFix()" style="display: none;">Apply Fix</button>
        <button onclick="clearEditor()">Clear</button>
      </div>
      <div id="editor"></div>
    </div>

    <div class="right">
      <h2>Output</h2>
      <div id="output"></div>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>© MarketOne International <span id="currentYear"></span></p>
    </div>
  </footer>

  <script src="html.js"></script>
  <script src="css.js"></script>
</body>
</html>
